# ============================================================================
# SuperPlane Software Factory — canvas-as-code (THE DELIVERABLE)
# Apply with:  superplane apps canvas update -f canvas/canvas.yaml
# Export with: superplane apps canvas get <app_id> -o yaml > canvas/canvas.yaml
#
# NOTE: this is a hand-authored skeleton. The reliable workflow is:
#   1) build/refine nodes in the SuperPlane UI,
#   2) `canvas get` to pull the real YAML (correct ids, integration ids, layout),
#   3) commit that here. Treat the configs below as the intended shape.
#
# Verified component keys (docs.superplane.com): webhook, claude, if, filter,
# runner, loop, github, render, slack, http.
# ============================================================================
apiVersion: v1
kind: Canvas
metadata:
  id: REPLACE_WITH_APP_ID            # required on update; from `superplane apps list`
  name: Software Factory
spec:
  nodes:
    # ---- 1. INTAKE: /solve comment OR web form (via ingest-gateway) ----------
    - id: intake-webhook
      name: Intake
      type: TYPE_TRIGGER
      component: webhook              # auth: Header Token (X-Webhook-Token). <=64KB
      position: { x: 0, y: 0 }
      configuration:
        auth: header_token

    # ---- 2. CLASSIFY: type + complexity (LLM) --------------------------------
    - id: classify
      name: Classify
      type: TYPE_ACTION
      component: claude               # claude.textPrompt
      position: { x: 300, y: 0 }
      configuration:
        model: claude-opus-4-8
        systemMessage: See prompts/classify.md
        prompt: |
          Classify this request. Return ONLY JSON:
          {"type":"BUG|FEATURE|DISCARD","complexity":"EASY|COMPLEX","reason":"..."}
          Request: {{ $['Intake'].data.body }}

    - id: gate-discard
      name: Discard?
      type: TYPE_ACTION
      component: if
      position: { x: 600, y: 0 }
      configuration:
        condition: $['Classify'].data.text contains '"type":"DISCARD"'
      # True channel -> drop. False -> continue.

    - id: gate-complex
      name: Complex?
      type: TYPE_ACTION
      component: if
      position: { x: 900, y: 0 }
      configuration:
        condition: $['Classify'].data.text contains '"complexity":"COMPLEX"'
      # True -> Slack approve gate. False (EASY) -> Spec agent.

    - id: approve-complex
      name: Authorize Build
      type: TYPE_ACTION
      component: slack                # slack.waitForButtonClick (Received/Timeout)
      position: { x: 1200, y: -150 }
      configuration:
        channel: REPLACE_SLACK_CHANNEL_ID
        message: "Complex request — authorize an automated build?"
        buttons:
          - { name: "Authorize", value: "approve" }
          - { name: "Skip", value: "reject" }

    # ---- 3. SPEC AGENT + spec gate -------------------------------------------
    - id: spec-agent
      name: Spec Agent
      type: TYPE_ACTION
      component: claude
      position: { x: 1200, y: 150 }
      configuration:
        model: claude-opus-4-8
        systemMessage: See prompts/spec-agent.md
        maxTokens: 2000
        prompt: |
          Produce a build spec as JSON with keys:
          summary, acceptance_criteria[], likely_files[], test_plan, preview_plan.
          Issue: {{ $['Intake'].data.body }}

    - id: gate-spec
      name: Spec Valid?
      type: TYPE_ACTION
      component: if
      position: { x: 1500, y: 150 }
      configuration:
        # fail if acceptance_criteria or likely_files are empty
        condition: $['Spec Agent'].data.text contains 'acceptance_criteria'

    # ---- 4. SELF-HEAL LOOP: implement -> build/test, until green --------------
    - id: build-loop
      name: Build Loop
      type: TYPE_ACTION
      component: loop                 # cycles ONLY through this node (verified)
      position: { x: 1800, y: 150 }
      configuration:
        maxIterations: 3
        untilExpression: $['Verify Build'].data[0].exit_code == 0
        delay: { type: fixed, seconds: 2 }
      # Next channel -> Implement ; last step (Verify Build) wires BACK to here.

    - id: implement
      name: Implement
      type: TYPE_ACTION
      component: runner               # Run Shell Commands -> runners/02-implement.sh
      position: { x: 2100, y: 150 }
      configuration:
        machineType: e1-large-amd64
        commands: See runners/02-implement.sh (clone fork, branch, claude -p)

    - id: verify-build
      name: Verify Build
      type: TYPE_ACTION
      component: runner               # runners/03-verify.sh (build + test + lint)
      position: { x: 2400, y: 150 }
      configuration:
        machineType: e1-large-amd64
        commands: See runners/03-verify.sh
      # wire Verify Build -> back to Build Loop (loop back-edge)

    # ---- 5. DEPLOY PREVIEW (Render) ------------------------------------------
    - id: deploy-preview
      name: Deploy Preview
      type: TYPE_ACTION
      component: runner               # runners/04-deploy-preview.sh (render deploys create)
      position: { x: 2700, y: 150 }
      configuration:
        machineType: e1-tiny-amd64
        commands: See runners/04-deploy-preview.sh

    # ---- 6. PROVE: Playwright verifier (Render service) ----------------------
    - id: prove
      name: Prove (Playwright)
      type: TYPE_ACTION
      component: http                 # HTTP Request -> VERIFIER_URL/verify
      position: { x: 3000, y: 150 }
      configuration:
        method: GET
        url: "{{ $.secrets.VERIFIER_URL }}/verify?url={{ $['Deploy Preview'].data[0].previewUrl }}"

    - id: gate-verified
      name: Verified?
      type: TYPE_ACTION
      component: if
      position: { x: 3300, y: 150 }
      configuration:
        condition: $['Prove (Playwright)'].data.status == 200

    # ---- 7. OPEN PR + comment with live link + screenshot --------------------
    - id: open-pr
      name: Open PR
      type: TYPE_ACTION
      component: github               # github.createPullRequest
      position: { x: 3600, y: 150 }
      configuration:
        integration: { id: REPLACE_GITHUB_INTEGRATION_ID }
        repository: REPLACE_OWNER/superplane
        base: main
        title: "[factory] {{ $['Spec Agent'].data.text }}"
        body: |
          Auto-built by the SuperPlane Software Factory.
          Preview: {{ $['Deploy Preview'].data[0].previewUrl }}

    - id: comment-pr
      name: Comment Link
      type: TYPE_ACTION
      component: github               # github.createIssueComment
      position: { x: 3900, y: 150 }
      configuration:
        integration: { id: REPLACE_GITHUB_INTEGRATION_ID }
        body: |
          ✅ Live preview: {{ $['Deploy Preview'].data[0].previewUrl }}
          ![proof]({{ $['Prove (Playwright)'].data.body.screenshotUrl }})

    # ---- 8. TELEMETRY -> Console dashboard -----------------------------------
    - id: telemetry
      name: Write Telemetry
      type: TYPE_ACTION
      component: http                 # POST run status to factory-status-web / Memory
      position: { x: 4200, y: 150 }
      configuration:
        method: PUT
        url: "{{ $.secrets.INGEST_GATEWAY_URL }}/runs/{{ $['Intake'].data.body.runId }}"

  edges:
    - { sourceId: intake-webhook, targetId: classify,       channel: default }
    - { sourceId: classify,       targetId: gate-discard,    channel: default }
    - { sourceId: gate-discard,   targetId: gate-complex,    channel: "false" }
    - { sourceId: gate-complex,   targetId: approve-complex, channel: "true" }
    - { sourceId: gate-complex,   targetId: spec-agent,      channel: "false" }
    - { sourceId: approve-complex,targetId: spec-agent,      channel: received }
    - { sourceId: spec-agent,     targetId: gate-spec,       channel: default }
    - { sourceId: gate-spec,      targetId: build-loop,      channel: "true" }
    - { sourceId: build-loop,     targetId: implement,       channel: next }
    - { sourceId: implement,      targetId: verify-build,    channel: passed }
    - { sourceId: verify-build,   targetId: build-loop,      channel: passed }   # loop back
    - { sourceId: build-loop,     targetId: deploy-preview,  channel: done }
    - { sourceId: deploy-preview, targetId: prove,           channel: passed }
    - { sourceId: prove,          targetId: gate-verified,   channel: default }
    - { sourceId: gate-verified,  targetId: open-pr,         channel: "true" }
    - { sourceId: open-pr,        targetId: comment-pr,      channel: default }
    - { sourceId: comment-pr,     targetId: telemetry,       channel: default }
